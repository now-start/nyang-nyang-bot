spring:
  jackson2:
    time-zone: Asia/Seoul
  cloud:
    config:
      enabled: false
  datasource:
    url: "jdbc:h2:mem:nyangnyangbot-test;MODE=MariaDB;TIME ZONE=Asia/Seoul;INIT=CREATE DOMAIN IF NOT EXISTS LONGTEXT AS CLOB;DB_CLOSE_DELAY=-1"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    baseline-on-migrate: false
    clean-disabled: true
    locations: "classpath:db/migration"
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        type:
          preferred_instant_jdbc_type: TIMESTAMP
        jdbc:
          time_zone: Asia/Seoul

logging:
  level:
    org:
      hibernate:
        orm.jdbc.bind: trace
