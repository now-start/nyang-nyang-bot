spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:h2:mem:nyangnyangbot-test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    baseline-on-migrate: false
    clean-disabled: true
    locations: "classpath:db/migration"
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

logging:
  level:
    org:
      hibernate:
        orm.jdbc.bind: trace
