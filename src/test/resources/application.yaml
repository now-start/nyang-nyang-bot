spring:
  cloud:
    config:
      enabled: false
  datasource:
    url: "jdbc:h2:mem:nyangnyangbot-test;MODE=MariaDB;TIME ZONE=Asia/Seoul;INIT=CREATE DOMAIN IF NOT EXISTS LONGTEXT AS CLOB;DB_CLOSE_DELAY=-1"
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

logging:
  level:
    org:
      hibernate:
        orm.jdbc.bind: trace
