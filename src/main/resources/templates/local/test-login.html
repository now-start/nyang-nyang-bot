<!DOCTYPE html>
<html data-bs-theme="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>로컬 테스트 로그인</title>
    <link crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="bg-dark text-light">
<main class="bg-landing-glow min-vh-100 px-4 py-5">
    <section class="container" style="max-width: 960px;">
        <header class="bg-header-gradient border border-secondary-subtle rounded-4 p-4 mb-4">
            <div class="d-flex flex-column flex-md-row gap-3 align-items-md-center justify-content-between">
                <div class="d-flex align-items-center gap-3">
                    <img th:replace="~{components/brand :: logo(44, 'rounded-3')}">
                    <div>
                        <p class="small text-secondary mb-1">local profile only</p>
                        <h1 class="h4 fw-bold text-white mb-0">로컬 테스트 로그인</h1>
                    </div>
                </div>
                <form method="post" th:action="@{/local/test-logout}" th:if="${currentAccount != null}">
                    <th:block th:replace="~{components/forms :: csrf-field}"></th:block>
                    <button class="btn btn-outline-secondary" type="submit">선택 초기화</button>
                </form>
            </div>
        </header>

        <div class="alert alert-secondary mb-4" th:if="${currentAccount == null}">
            계정을 선택하면 local 세션에 인증 정보가 저장되고 운영 화면으로 이동합니다.
        </div>
        <div class="alert alert-success mb-4" th:if="${currentAccount != null}">
            현재 선택:
            <strong th:text="${currentAccount.nickName}">로컬 관리자</strong>
            <span th:text="${currentAccount.admin ? 'ADMIN' : 'USER'}">ADMIN</span>
        </div>

        <div class="row g-3">
            <div class="col-12 col-md-4" th:each="account : ${accounts}">
                <form class="h-100" method="post" th:action="@{/local/test-login}">
                    <th:block th:replace="~{components/forms :: csrf-field}"></th:block>
                    <input name="redirect" th:value="${redirect}" type="hidden">
                    <input name="userId" th:value="${account.userId}" type="hidden">
                    <button class="card h-100 w-100 text-start border-secondary-subtle"
                            th:classappend="${currentAccount != null and currentAccount.userId == account.userId} ? ' border-success'"
                            type="submit">
                        <span class="card-body vstack gap-3">
                            <span class="d-flex align-items-center justify-content-between gap-2">
                                <span class="fw-bold text-white" th:text="${account.nickName}">로컬 관리자</span>
                                <span class="badge rounded-pill"
                                      th:classappend="${account.admin} ? ' text-bg-success' : ' text-bg-secondary'"
                                      th:text="${account.admin ? 'ADMIN' : 'USER'}">ADMIN</span>
                            </span>
                            <span class="small text-secondary" th:text="${account.userId}">local-channel</span>
                            <span class="small text-secondary" th:text="${account.description}">설명</span>
                            <span class="btn btn-success w-100 mt-auto">이 계정으로 보기</span>
                        </span>
                    </button>
                </form>
            </div>
        </div>
    </section>
</main>
</body>
</html>
