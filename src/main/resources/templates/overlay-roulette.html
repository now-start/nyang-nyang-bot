<!DOCTYPE html>
<html data-bs-theme="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>룰렛 오버레이</title>
    <link crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <script defer src="https://unpkg.com/htmx.org@2.0.4"></script>
    <!-- OBS 오버레이 전용 스타일 — ux-ui-guidelines §5.1 예외 영역 (overlay-design.md) -->
    <style>
        html, body {
            background: transparent !important;
            font-family: "Archivo", "Space Grotesk", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        }

        /* IDLE/CONNECTING/READY 상태는 방송 화면에 아무것도 표시하지 않는다 */
        .overlay-idle {
            visibility: hidden;
        }

        /* DISPLAYING 패널 — 중앙 70% 안전 영역, 폭 760px */
        .overlay-panel {
            width: min(760px, 70vw);
            background: rgba(0, 0, 0, 0.82);
            border: 1px solid rgba(0, 255, 163, 0.35);
            border-radius: 40px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            color: #ffffff;
        }

        .overlay-title {
            font-size: 38px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.01em;
        }

        .overlay-round-pill {
            font-size: 15px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 999px;
            background: rgba(0, 255, 163, 0.15);
            color: #00ffa3;
            font-variant-numeric: tabular-nums;
        }

        .overlay-result {
            font-size: 34px;
            font-weight: 800;
            color: #00ffa3;
            text-shadow: 0 2px 18px rgba(0, 255, 163, 0.4);
        }

        .overlay-result-losing {
            color: #8f9894;
            text-shadow: none;
        }

        .overlay-error {
            font-size: 12px;
            color: rgba(255, 107, 107, 0.75);
        }
    </style>
</head>
<body>
<main class="min-vh-100 d-flex align-items-center justify-content-center p-4">
    <section th:replace="~{features/overlay/roulette :: overlay-loader}"></section>
</main>
</body>
</html>
