<!DOCTYPE html>
<html data-bs-theme="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>룰렛 오버레이</title>
    <link crossorigin="anonymous"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <script defer src="https://unpkg.com/htmx.org@2.0.4"></script>
    <!-- OBS 오버레이 전용 스타일 — ux-ui-guidelines §5.1 예외 영역 (overlay-design.md) -->
    <style>
        html, body {
            background: transparent !important;
            font-family: "Archivo", "Space Grotesk", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
        }

        /* IDLE/CONNECTING/READY 상태는 방송 화면에 아무것도 표시하지 않는다 */
        .overlay-idle {
            visibility: hidden;
        }

        /* DISPLAYING 패널 — 중앙 70% 안전 영역, 폭 760px */
        .overlay-panel {
            width: min(760px, 70vw);
            background: rgba(0, 0, 0, 0.82);
            border: 1px solid rgba(0, 255, 163, 0.35);
            border-radius: 40px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            color: #ffffff;
        }

        .overlay-title {
            font-size: 38px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.01em;
        }

        .overlay-round-pill {
            font-size: 15px;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 999px;
            background: rgba(0, 255, 163, 0.15);
            color: #00ffa3;
            font-variant-numeric: tabular-nums;
        }

        .overlay-result {
            font-size: 34px;
            font-weight: 800;
            color: #00ffa3;
            text-shadow: 0 2px 18px rgba(0, 255, 163, 0.4);
        }

        .overlay-result-losing {
            color: #8f9894;
            text-shadow: none;
        }

        .overlay-stage {
            display: grid;
            grid-template-columns: minmax(180px, 260px) minmax(0, 1fr);
            gap: 28px;
            align-items: center;
        }

        .overlay-wheel-wrap {
            position: relative;
            width: min(260px, 34vw);
            aspect-ratio: 1;
            margin-inline: auto;
        }

        .overlay-wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#00ffa3 0 102deg, #1d2422 102deg 196deg, #00c37e 196deg 284deg, #2a3330 284deg 330deg, #00ffa3 330deg 360deg);
            border: 6px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 18px 60px rgba(0, 255, 163, 0.18);
        }

        .overlay-wheel-core {
            position: absolute;
            inset: 50%;
            width: 42%;
            height: 42%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.76);
            border: 1px solid rgba(255, 255, 255, 0.14);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .overlay-wheel-core span {
            font-size: 11px;
            color: #8f9894;
            letter-spacing: 0.08em;
        }

        .overlay-wheel-core strong {
            color: #00ffa3;
            font-size: 22px;
            font-variant-numeric: tabular-nums;
        }

        .overlay-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
        }

        .overlay-round-card {
            border: 1px solid rgba(143, 152, 148, 0.45);
            border-radius: 24px;
            padding: 16px;
            min-height: 132px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .overlay-error {
            font-size: 12px;
            color: rgba(255, 107, 107, 0.75);
        }

        @media (max-width: 900px) {
            .overlay-stage {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<main class="min-vh-100 d-flex align-items-center justify-content-center p-4">
    <section th:replace="~{features/overlay/roulette :: overlay-loader}"></section>
</main>
</body>
</html>
