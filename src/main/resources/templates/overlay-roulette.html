<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>룰렛 오버레이</title>
    <link href="/css/overlay-roulette.css" rel="stylesheet">
</head>
<body>
<main aria-live="polite" class="overlay-root" id="overlay-root">
    <section class="roulette-stage" id="roulette-stage">
        <div class="roulette-meta">
            <span id="roulette-donor"></span>
            <strong id="roulette-round"></strong>
        </div>
        <div class="roulette-result" id="roulette-result"></div>
        <div class="roulette-sub" id="roulette-sub"></div>
        <div class="roulette-summary" id="roulette-summary"></div>
    </section>
</main>
<script src="/js/overlay-roulette.js"></script>
</body>
</html>
