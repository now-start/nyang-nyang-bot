<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<thead th:fragment="header(firstColumn, secondColumn, thirdColumn, fourthColumn, fifthColumn, actionLabel)">
<tr>
    <th scope="col" th:text="${firstColumn}">컬럼</th>
    <th scope="col" th:text="${secondColumn}">컬럼</th>
    <th scope="col" th:text="${thirdColumn}">컬럼</th>
    <th scope="col" th:if="${fourthColumn != null and fourthColumn != ''}" th:text="${fourthColumn}">컬럼</th>
    <th scope="col" th:if="${fifthColumn != null and fifthColumn != ''}" th:text="${fifthColumn}">컬럼</th>
    <th class="text-end" scope="col" th:if="${actionLabel != null and actionLabel != ''}" th:text="${actionLabel}">작업</th>
</tr>
</thead>
</body>
</html>
