<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<span class="badge rounded-pill"
      th:classappend="${tone == 'brand' or tone == 'success'} ? ' text-bg-success' :
        (${tone == 'warning'} ? ' text-bg-warning' :
        (${tone == 'danger'} ? ' text-bg-danger' :
        (${tone == 'dark'} ? ' text-bg-dark border border-secondary-subtle' : ' text-bg-secondary')))"
      th:fragment="status(label, tone)"
      th:text="${label}">상태</span>
</body>
</html>
