<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<button aria-selected="false"
        class="nav-link"
        data-bs-toggle="tab"
        role="tab"
        th:aria-controls="${target}"
        th:aria-selected="${active}"
        th:classappend="${active} ? ' active'"
        th:data-bs-target="${'#' + target}"
        th:fragment="tab-button(label, target, active)"
        th:id="${target + '-button'}"
        th:text="${label}"
        type="button">탭</button>

<button aria-selected="false"
        class="nav-link d-inline-flex align-items-center gap-2"
        data-bs-toggle="tab"
        role="tab"
        th:aria-controls="${target}"
        th:aria-selected="${active}"
        th:classappend="${active} ? ' active'"
        th:data-bs-target="${'#' + target}"
        th:fragment="tab-button-badge(label, badge, target, active)"
        th:id="${target + '-button'}"
        type="button">
    <span th:text="${label}">탭</span>
    <span class="badge rounded-pill bg-success-subtle text-success nav-beta-badge" th:text="${badge}">BETA</span>
</button>

<div th:fragment="pagination(page, baseUrl)" th:if="${page != null}">
	<nav th:if="${page.totalPages > 1}"
	         th:with="blockSize=${10}, start=${(page.number / blockSize) * blockSize},
	          endCandidate=${start + blockSize - 1},
	          end=${endCandidate < page.totalPages ? endCandidate : page.totalPages - 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${page.number == 0} ? 'disabled'">
                <a aria-label="이전 페이지" class="page-link" th:href="@{|${baseUrl}?page=${page.number - 1}|}">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>

            <li class="page-item" th:if="${start > 0}">
                <a class="page-link" th:href="@{|${baseUrl}?page=0|}">1</a>
            </li>
            <li class="page-item disabled" th:if="${start > 1}">
                <span class="page-link">...</span>
            </li>

            <li class="page-item"
                th:classappend="${i == page.number} ? 'active'"
                th:each="i : ${#numbers.sequence(start, end)}">
                <a class="page-link" th:href="@{|${baseUrl}?page=${i}|}" th:text="${i + 1}"></a>
            </li>

            <li class="page-item disabled" th:if="${end < page.totalPages - 2}">
                <span class="page-link">...</span>
            </li>
            <li class="page-item" th:if="${end < page.totalPages - 1}">
                <a class="page-link" th:href="@{|${baseUrl}?page=${page.totalPages - 1}|}" th:text="${page.totalPages}"></a>
            </li>

            <li class="page-item" th:classappend="${page.number == page.totalPages - 1} ? 'disabled'">
                <a aria-label="다음 페이지" class="page-link" th:href="@{|${baseUrl}?page=${page.number + 1}|}">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
