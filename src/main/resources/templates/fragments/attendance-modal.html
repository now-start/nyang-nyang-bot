<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div class="management-panel attendance-panel" th:fragment="attendance-panel">
    <div class="attendance-meta">
        <div class="attendance-field">
            <span>호감도 증가</span>
            <input id="attendance-amount" min="1" type="number" value="1">
        </div>
        <div class="attendance-status">
            <span id="attendance-count">0명 선택</span>
            <span id="attendance-total">0명 현재</span>
        </div>
    </div>
    <div class="attendance-list" id="attendance-list"></div>
    <div class="modal-actions">
        <button class="btn-strong btn-auth" id="attendance-apply" type="button">선택 대상 반영</button>
    </div>
</div>
</body>
</html>
