<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div class="vstack gap-3" th:fragment="attendance-panel">
    <div class="visually-hidden"
         hx-swap="innerHTML"
         hx-target="#attendance-feedback"
         hx-trigger="shown.bs.tab from:#attendance-tab-button"
         th:hx-post="@{/attendance/start}"></div>
    <div class="visually-hidden"
         hx-swap="innerHTML"
         hx-target="#attendance-feedback"
         hx-trigger="hidden.bs.tab from:#attendance-tab-button"
         th:hx-post="@{/attendance/stop}"></div>
    <form hx-disabled-elt="find button"
          hx-post="/attendance/apply"
          hx-swap="innerHTML"
          hx-target="#attendance-feedback"
          id="attendance-form"
          method="post"
          th:hx-post="@{/attendance/apply}">
        <th:block th:replace="~{components/forms :: csrf-field}"></th:block>
        <div class="row g-3 align-items-end">
            <div class="col-12 col-md-4">
                <label class="form-label" for="attendance-amount">호감도 증가</label>
                <input class="form-control"
                       id="attendance-amount"
                       min="1"
                       name="amount"
                       required
                       type="number"
                       value="1">
            </div>
        </div>
        <div class="vstack gap-2"
             hx-swap="outerHTML"
             hx-trigger="attendance-users-refresh from:body"
             id="attendance-list"
             th:hx-post="@{/attendance/users}">
            <div class="d-flex flex-wrap gap-2">
                <span class="badge text-bg-secondary">0명 선택</span>
                <span class="badge text-bg-secondary">0명 현재</span>
            </div>
            <div class="text-secondary small">탭을 열면 현재 채팅 참여자를 불러옵니다.</div>
        </div>
        <div class="mt-2" id="attendance-feedback"></div>
        <div class="d-flex justify-content-end">
            <th:block th:replace="~{components/buttons :: action-button('attendance-apply', '선택 대상 반영', 'primary', 'submit', null)}"></th:block>
        </div>
    </form>
</div>

<div class="vstack gap-2"
     hx-include="#attendance-list input[name='userIds'], #attendance-list input[name='knownUserIds']"
     hx-post="/attendance/users"
     hx-swap="outerHTML"
     hx-trigger="change from:.attendance-user-checkbox delay:100ms, attendance-users-refresh from:body, every 5s"
     hx-vals='{"selectionInitialized":"true"}'
     id="attendance-list"
     th:fragment="attendance-list(users)"
     th:hx-post="@{/attendance/users}">
    <div class="d-flex flex-wrap gap-2">
        <span class="badge text-bg-secondary" th:text="${selectedCount == null ? 0 : selectedCount} + '명 선택'">0명 선택</span>
        <span class="badge text-bg-secondary" th:text="${totalCount == null ? 0 : totalCount} + '명 현재'">0명 현재</span>
    </div>
    <div class="text-secondary small" th:if="${users == null or #lists.isEmpty(users)}">현재 채팅 참여자가 없습니다.</div>
    <div class="d-flex flex-wrap gap-2 overflow-auto py-2"
         th:if="${users != null and !#lists.isEmpty(users)}">
        <th:block th:each="user, iterStat : ${users}"
                  th:with="selected=${selectedUserIds == null or selectedUserIds.contains(user.userId) or !knownUserIds.contains(user.userId)},
                           controlId=${'attendance-user-' + iterStat.index}">
            <input name="knownUserIds" th:value="${user.userId}" type="hidden">
            <input autocomplete="off"
                   class="btn-check attendance-user-checkbox"
                   th:id="${controlId}"
                   name="userIds"
                   th:checked="${selected}"
                   th:value="${user.userId}"
                   type="checkbox">
            <label class="btn btn-outline-secondary btn-sm"
                   th:for="${controlId}"
                   th:text="${user.nickName != null and !#strings.isEmpty(user.nickName) ? user.nickName : user.userId}">치즈냥</label>
        </th:block>
    </div>
</div>

<div th:fragment="attendance-feedback-response(message, tone, resetAttendanceList)">
    <div th:replace="~{components/feedback :: alert(${message}, ${tone})}"></div>
    <div class="vstack gap-2"
         hx-swap="outerHTML"
         hx-swap-oob="outerHTML"
         hx-trigger="attendance-users-refresh from:body"
         id="attendance-list"
         th:hx-post="@{/attendance/users}"
         th:if="${resetAttendanceList}">
        <div class="d-flex flex-wrap gap-2">
            <span class="badge text-bg-secondary">0명 선택</span>
            <span class="badge text-bg-secondary">0명 현재</span>
        </div>
        <div class="text-secondary small">탭을 열면 현재 채팅 참여자를 불러옵니다.</div>
    </div>
</div>
</body>
</html>
