<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div class="row g-3 align-items-end" th:fragment="panel-header(listUrl, activeOptions)">
    <div class="col-12 col-lg-7">
        <p class="mb-0 small text-secondary">스트리머 · 채팅</p>
        <h2 class="h4 fw-bold text-white mb-1">명령어 관리</h2>
        <p class="mb-0 small text-secondary">명령어 응답을 만들고 실제 출력 결과까지 한 화면에서 확인합니다.</p>
    </div>
    <div class="col-12 col-lg-5">
        <div th:replace="~{features/command/components :: filter-toolbar(${listUrl}, ${activeOptions})}"></div>
    </div>
</div>

<form class="row g-2"
      hx-swap="outerHTML"
      hx-target="#command-list-region"
      hx-trigger="change, submit"
      id="command-filter-form"
      th:fragment="filter-toolbar(listUrl, activeOptions)"
      th:hx-get="${listUrl}">
    <div class="col-12 col-sm-9">
        <div th:replace="~{components/forms :: filter-select('command-filter-active', 'active', '상태', '', ${activeOptions}, null)}"></div>
    </div>
    <div class="col-12 col-sm-3 d-grid">
        <th:block th:replace="~{components/buttons :: action-button(null, '조회', 'ghost', 'submit', null)}"></th:block>
    </div>
</form>

<div class="row g-3" th:fragment="workspace(listUrl, editorUrl)">
    <div class="col-12 col-xl-7">
        <section class="card p-3"
                 hx-swap="outerHTML"
                 hx-trigger="load"
                 id="command-list-region"
                 th:hx-get="${listUrl}">
            <div class="text-secondary">명령어 목록을 불러오는 중입니다.</div>
        </section>
    </div>
    <div class="col-12 col-xl-5">
        <section class="card p-3"
                 hx-swap="outerHTML"
                 hx-trigger="load"
                 id="command-editor-region"
                 th:hx-get="${editorUrl}">
            <div class="text-secondary">편집 폼을 불러오는 중입니다.</div>
        </section>
    </div>
</div>

<div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3"
     th:fragment="list-header(newEditorUrl)">
    <div>
        <h3 class="h6 fw-bold mb-1">목록</h3>
        <p class="mb-0 small text-secondary">편집 버튼을 누르면 오른쪽에서 내용을 수정할 수 있습니다.</p>
    </div>
    <th:block th:replace="~{components/buttons :: hx-get-button(null, '새 명령어', 'ghost', 'sm', ${newEditorUrl}, '#command-editor-region', 'outerHTML', null)}"></th:block>
</div>

<th:block th:fragment="command-table(commands, editorUrl)">
    <th:block th:if="${commands == null or #lists.isEmpty(commands)}">
        <div th:replace="~{components/feedback :: empty-state('표시할 명령어가 없습니다.')}"></div>
    </th:block>

    <div class="table-responsive" th:if="${commands != null and !#lists.isEmpty(commands)}">
        <table class="table table-dark table-hover align-middle mb-0">
            <thead th:replace="~{components/tables :: header('명령어', '상태', '쿨타임', '수정자', null, '작업')}"></thead>
            <tbody>
            <th:block th:each="command : ${commands}">
                <tr th:replace="~{features/command/components :: command-row(${command}, ${editorUrl})}"></tr>
            </th:block>
            </tbody>
        </table>
    </div>
</th:block>

<tr th:fragment="command-row(command, editorUrl)">
    <td>
        <strong class="text-success" th:text="${command.triggerLabel}">!공지</strong>
        <span class="d-block small text-secondary text-truncate" th:text="${command.messageSummary}">응답 메시지</span>
    </td>
    <td>
        <span class="badge rounded-pill"
              th:classappend="${command.active} ? ' bg-success-subtle text-success' : ' bg-secondary-subtle text-secondary'"
              th:text="${command.statusLabel}">활성</span>
    </td>
    <td class="text-end tabular-nums" th:text="${command.cooldownLabel}">30초</td>
    <td th:text="${command.updatedByLabel}">admin</td>
    <td class="text-end">
        <th:block th:replace="~{components/buttons :: hx-get-button(null, '편집', 'ghost', 'sm', ${editorUrl + '?commandId=' + command.id}, '#command-editor-region', 'outerHTML', null)}"></th:block>
    </td>
</tr>

<div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3"
     th:fragment="editor-header(commandForm, saveMessage)">
    <div>
        <h3 class="h6 fw-bold mb-1"
            data-editor-heading
            tabindex="-1"
            th:text="${commandForm.commandId == null ? '새 명령어' : '명령어 편집'}">새 명령어</h3>
        <p class="mb-0 small text-secondary">응답을 확인한 뒤 명령어를 저장합니다.</p>
    </div>
    <span aria-live="polite" role="status" th:if="${saveMessage}">
        <span th:replace="~{components/badges :: status(${saveMessage}, 'success')}">저장됨</span>
    </span>
</div>

<div class="alert alert-danger" role="alert" th:fragment="save-error(saveError)" th:if="${saveError}" th:text="${saveError}"></div>

<div class="row g-3" th:fragment="editor-fields(commandForm)">
    <div class="col-12 col-md-6">
        <div th:replace="~{components/forms :: text-field('command-trigger', 'trigger', '채팅 호출어', ${commandForm == null ? '' : commandForm.trigger}, '!공지', 20, null)}"></div>
    </div>
    <div class="col-12 col-md-6">
        <div th:replace="~{components/forms :: number-field('command-cooldown', 'userCooldownSeconds', '사용자별 쿨타임(초)', ${commandForm == null ? 30 : commandForm.userCooldownSeconds}, 5, 3600, null)}"></div>
    </div>
    <div class="col-12">
        <div th:replace="~{components/forms :: switch-field('command-active', 'active', '활성', ${commandForm != null and commandForm.active}, null)}"></div>
    </div>
    <div class="col-12">
        <div th:replace="~{components/forms :: textarea-field('command-message-template', 'messageTemplate', '냥냥봇 응답 템플릿', ${commandForm == null ? '' : commandForm.messageTemplate}, '{viewer.nickname}님, 오늘 공지는 ...', 4, 1000, null)}"></div>
        <div class="dropdown mt-2" th:replace="~{features/command/components :: variable-picker(${commandVariableGroups})}"></div>
    </div>
</div>

<div class="dropdown mt-2" th:fragment="variable-picker(variableGroups)">
    <button aria-expanded="false"
            class="btn btn-outline-secondary btn-sm"
            data-bs-auto-close="outside"
            data-bs-toggle="dropdown"
            type="button">변수 넣기</button>
    <div class="dropdown-menu template-variable-menu p-2">
        <th:block th:each="group : ${variableGroups}">
            <h4 class="dropdown-header px-2" th:text="${group.label}">시청자</h4>
            <ul class="list-unstyled mb-2">
                <li th:each="variable : ${group.variables}">
                    <button class="dropdown-item rounded-2 px-2 py-2 text-wrap"
                            data-template-target="#command-message-template"
                            th:attr="data-template-variable=${'{' + variable.key + '}'}"
                            type="button">
                        <span class="d-flex flex-wrap align-items-baseline gap-2">
                            <span class="fw-semibold" th:text="${variable.label}">시청자 닉네임</span>
                            <code class="text-success text-break" th:text="${'{' + variable.key + '}'}">{viewer.nickname}</code>
                        </span>
                        <span class="d-block small text-secondary" th:text="${variable.description + ' · 예: ' + variable.example}">설명</span>
                    </button>
                </li>
            </ul>
        </th:block>
    </div>
</div>

<div class="d-flex flex-wrap gap-2" th:fragment="editor-actions(commandForm, previewUrl, deactivateUrl)">
    <th:block th:if="${commandForm.commandId != null and commandForm.active}">
        <th:block th:replace="~{components/buttons :: hx-post-button(null, '비활성화', 'danger', null, ${deactivateUrl}, '#command-editor-region', '#command-editor-form [name=commandId]', 'outerHTML', 'me-auto')}"></th:block>
    </th:block>
    <th:block th:replace="~{components/buttons :: hx-post-button(null, '검증 및 미리보기', 'ghost', null, ${previewUrl}, '#command-review-region', '#command-editor-form', 'outerHTML', ${commandForm.commandId == null ? 'ms-auto' : null})}"></th:block>
    <th:block th:replace="~{components/buttons :: action-button(null, ${commandForm.commandId == null ? '명령어 생성' : '변경사항 저장'}, 'primary', 'submit', null)}"></th:block>
</div>
</body>
</html>
