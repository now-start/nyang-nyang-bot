<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="vstack gap-3"
         th:fragment="command-panel"
         th:with="listUrl=@{/admin/commands},
                  editorUrl=@{/admin/commands/editor}">
    <div th:replace="~{features/command/components :: panel-header(${listUrl}, ${commandActiveOptions})}"></div>
    <div th:replace="~{features/command/components :: workspace(${listUrl}, ${editorUrl})}"></div>
</section>

<section class="card p-3"
         data-component="command-list"
         hx-include="#command-filter-form"
         hx-swap="outerHTML"
         hx-trigger="command-list-refresh from:body"
         id="command-list-region"
         th:fragment="command-list-region"
         th:hx-get="@{/admin/commands}"
         th:with="editorUrl=@{/admin/commands/editor},
                  newEditorUrl=@{/admin/commands/editor/new}">
    <div th:replace="~{features/command/components :: list-header(${newEditorUrl})}"></div>
    <div th:replace="~{features/command/components :: command-table(${commands}, ${editorUrl})}"></div>
</section>

<section class="card p-3"
         data-component="command-editor"
         id="command-editor-region"
         th:fragment="command-editor-region"
         th:with="saveUrl=@{/admin/commands},
                  previewUrl=@{/admin/commands/preview},
                  deactivateUrl=@{/admin/commands/deactivate}">
    <div th:replace="~{features/command/components :: save-error(${saveError})}"></div>

    <div class="d-flex flex-column align-items-center justify-content-center text-center py-5"
         th:if="${commandForm == null}">
        <h3 class="h6 fw-bold mb-2">명령어를 선택하세요</h3>
        <p class="small text-secondary mb-0">명령어를 선택하거나 새 명령어를 만드세요.</p>
    </div>

    <th:block th:if="${commandForm != null}">
        <div th:replace="~{features/command/components :: editor-header(${commandForm}, ${saveMessage})}"></div>

        <form class="vstack gap-3"
              data-review-target="#command-review-region"
              hx-disabled-elt="find button"
              hx-swap="outerHTML"
              hx-target="#command-editor-region"
              id="command-editor-form"
              th:hx-post="${saveUrl}">
            <input th:replace="~{components/forms :: hidden-field('commandId', ${commandForm.commandId == null ? '' : commandForm.commandId})}">
            <th:block th:replace="~{components/forms :: csrf-field}"></th:block>

            <div th:replace="~{features/command/components :: editor-fields(${commandForm})}"></div>
            <div th:replace="~{features/command/components :: editor-actions(${commandForm}, ${previewUrl}, ${deactivateUrl})}"></div>
        </form>

        <div class="mt-3" th:replace="~{features/command/regions :: command-review-region}"></div>
    </th:block>
</section>

<section aria-live="polite" id="command-review-region" th:fragment="command-review-region">
    <th:block th:if="${reviewResult != null and !reviewResult.valid}">
        <div th:replace="~{components/feedback :: validation-summary('검증 실패', ${reviewResult.errors})}"></div>
    </th:block>
    <th:block th:if="${reviewResult != null and reviewResult.valid}">
        <div th:replace="~{components/feedback :: alert('검증을 통과했습니다.', 'success')}"></div>
        <div class="border border-dashed rounded-3 p-3 small mt-2" th:if="${reviewResult.previewMessage}">
            <span class="text-success fw-semibold">냥냥봇:</span>
            <span class="template-preview-message" th:text="${reviewResult.previewMessage}">미리보기 메시지</span>
        </div>
    </th:block>
</section>
</body>
</html>
