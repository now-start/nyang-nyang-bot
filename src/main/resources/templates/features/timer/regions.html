<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<section class="vstack gap-3"
         th:fragment="timer-panel"
         th:with="listUrl=@{/admin/timers},
                  editorUrl=@{/admin/timers/editor}">
    <div th:replace="~{features/timer/components :: panel-header(${listUrl}, ${timerActiveOptions})}"></div>
    <div th:replace="~{features/timer/components :: workspace(${listUrl}, ${editorUrl})}"></div>
</section>

<section class="card p-3"
         data-component="timer-list"
         hx-include="#timer-filter-form"
         hx-swap="outerHTML"
         hx-trigger="timer-list-refresh from:body"
         id="timer-list-region"
         th:fragment="timer-list-region"
         th:hx-get="@{/admin/timers}"
         th:with="editorUrl=@{/admin/timers/editor},
                  newEditorUrl=@{/admin/timers/editor/new}">
    <div th:replace="~{features/timer/components :: list-header(${newEditorUrl})}"></div>
    <div th:replace="~{features/timer/components :: timer-table(${timerMessages}, ${editorUrl})}"></div>
</section>

<section class="card p-3"
         data-component="timer-editor"
         id="timer-editor-region"
         th:fragment="timer-editor-region"
         th:with="saveUrl=@{/admin/timers},
                  previewUrl=@{/admin/timers/preview},
                  deactivateUrl=@{/admin/timers/deactivate}">
    <div th:replace="~{features/timer/components :: save-error(${saveError})}"></div>

    <div class="d-flex flex-column align-items-center justify-content-center text-center py-5"
         th:if="${timerMessageForm == null}">
        <h3 class="h6 fw-bold mb-2">타이머를 선택하세요</h3>
        <p class="small text-secondary mb-0">목록에서 편집할 타이머를 고르거나 새 타이머를 만드세요.</p>
    </div>

    <th:block th:if="${timerMessageForm != null}">
        <div th:replace="~{features/timer/components :: editor-header(${timerMessageForm}, ${saveMessage})}"></div>

        <form class="vstack gap-3"
              data-review-target="#timer-review-region"
              hx-disabled-elt="find button"
              hx-swap="outerHTML"
              hx-target="#timer-editor-region"
              id="timer-editor-form"
              th:hx-post="${saveUrl}">
            <input th:replace="~{components/forms :: hidden-field('timerMessageId', ${timerMessageForm.timerMessageId == null ? '' : timerMessageForm.timerMessageId})}">
            <th:block th:replace="~{components/forms :: csrf-field}"></th:block>

            <div th:replace="~{features/timer/components :: editor-fields(${timerMessageForm})}"></div>
            <div th:replace="~{features/timer/components :: execution-status(${timerMessageForm})}"></div>
            <div th:replace="~{features/timer/components :: editor-actions(${timerMessageForm}, ${previewUrl}, ${deactivateUrl})}"></div>
        </form>

        <div class="mt-3" th:replace="~{features/timer/regions :: timer-review-region}"></div>
    </th:block>
</section>

<section aria-live="polite" id="timer-review-region" th:fragment="timer-review-region">
    <th:block th:if="${timerReview != null and !timerReview.valid}">
        <div th:replace="~{components/feedback :: validation-summary('검증 실패', ${timerReview.errors})}"></div>
    </th:block>
    <th:block th:if="${timerReview != null and timerReview.valid}">
        <div th:replace="~{components/feedback :: alert('검증을 통과했습니다.', 'success')}"></div>
        <div class="border border-dashed rounded-3 p-3 small mt-2" th:if="${timerReview.previewMessage}">
            <span class="text-success fw-semibold">냥냥봇:</span>
            <span class="template-preview-message" th:text="${timerReview.previewMessage}">미리보기 메시지</span>
        </div>
    </th:block>
</section>
</body>
</html>
