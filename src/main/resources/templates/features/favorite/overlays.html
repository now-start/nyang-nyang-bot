<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="karma-modal">
    <div class="modal-backdrop" id="karma-modal">
        <div class="modal-panel">
            <div class="modal-header">
                <div class="modal-header-content">
                    <div class="badge" id="karma-target"></div>
                </div>
                <button aria-label="닫기" class="modal-close btn btn-outline-secondary btn-sm" id="karma-close" title="닫기" type="button">×</button>
            </div>
            <div class="adjustment-list" id="adjustment-list"></div>
            <div class="manual-adjustment">
                <div th:replace="~{components/forms :: number-input('manual-amount', '수동 입력', '', '+5 / -5', null, null, 1, null)}"></div>
                <div th:replace="~{components/forms :: text-input('manual-history', '사유', '', '사유 입력', false, null)}"></div>
            </div>
            <div class="calc-panel">
                <div class="calc-row"><span>현재 호감도</span><strong id="calc-current">0</strong></div>
                <div class="calc-row"><span>수동 입력</span><strong id="calc-manual">0</strong></div>
                <div class="calc-row"><span>선택 합계</span><strong id="calc-delta">0</strong></div>
                <div class="calc-row"><span>적용 후</span><strong id="calc-after">0</strong></div>
            </div>
            <div class="modal-actions d-flex flex-wrap gap-2 justify-content-end">
                <th:block th:replace="~{components/buttons :: action-button('karma-clear', '선택 초기화', 'ghost', 'button', null)}"></th:block>
                <th:block th:replace="~{components/buttons :: action-button('karma-apply', '수정 적용', 'primary', 'button', 'btn-auth')}"></th:block>
            </div>
        </div>
    </div>
</div>
</body>
</html>
