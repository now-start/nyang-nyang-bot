<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<header class="bg-header-gradient border border-secondary-subtle rounded-4 p-4" th:fragment="hero(currentNickName)">
    <div class="d-flex flex-column flex-md-row gap-3 align-items-md-center justify-content-between">
        <div class="d-flex align-items-center gap-3">
            <img th:replace="~{components/brand :: logo(44, 'rounded-3')}">
            <div>
                <h1 class="h4 fw-bold text-white mb-0">치즈냥 호감도</h1>
                <p class="mb-0 small text-secondary">
                    <span th:text="${currentNickName != null ? currentNickName : '치즈냥'}">치즈냥</span>
                    <span class="text-success fw-semibold" th:if="${isAdmin}"> · 관리자</span>
                </p>
            </div>
        </div>
        <div class="d-flex flex-wrap gap-2" th:if="${isAdmin or localTestLoginEnabled == true}">
            <a class="btn btn-outline-secondary"
               th:href="@{/local/test-login(redirect='/favorite/list')}"
               th:if="${localTestLoginEnabled == true}">테스트 계정 전환</a>
            <th:block th:if="${isAdmin}">
                <button class="btn btn-secondary"
                        hx-disabled-elt="this"
                        hx-swap="innerHTML"
                        hx-target="#sync-feedback"
                        id="sync-button"
                        th:hx-post="@{/google/sync}"
                        type="button">데이터 동기화</button>
                <button class="btn btn-success"
                        hx-disabled-elt="this"
                        hx-swap="innerHTML"
                        hx-target="#sync-feedback"
                        id="chzzk-connect-button"
                        th:hx-post="@{/chzzk/connect}"
                        type="button">채팅 연결</button>
            </th:block>
        </div>
    </div>
</header>

<div aria-label="관리자 메뉴" class="nav nav-pills flex-nowrap overflow-auto gap-2" role="tablist"
     th:fragment="admin-tabs"
     th:if="${isAdmin}">
    <th:block th:replace="~{components/navigation :: tab-button('호감도 목록', 'favorite-tab', true)}"></th:block>
    <th:block th:replace="~{components/navigation :: tab-button('출석체크', 'attendance-tab', false)}"></th:block>
    <th:block th:replace="~{components/navigation :: tab-button('룰렛 관리', 'roulette-tab', false)}"></th:block>
    <th:block th:replace="~{components/navigation :: tab-button('명령어 관리', 'command-tab', false)}"></th:block>
</div>

<section aria-labelledby="favorite-tab-button" class="tab-pane fade show active" id="favorite-tab" role="tabpanel"
         th:fragment="favorite-tab(favoriteList, nickName, isAdmin, weeklyChatRanks)">
    <section th:replace="~{features/favorite/components :: favorite-board-region(${favoriteList}, ${nickName}, ${isAdmin}, ${weeklyChatRanks})}"></section>
    <div class="mt-2" id="sync-feedback"></div>
</section>

<section class="vstack gap-3"
         id="favorite-board-region"
         hx-swap="outerHTML"
         hx-target="this"
         hx-trigger="favorite-board-refresh from:body"
         th:fragment="favorite-board-region(favoriteList, nickName, isAdmin, weeklyChatRanks)"
         th:hx-get="@{/favorite/list(page=${favoriteList.number},size=${favoriteList.size},nickName=${nickName})}">
    <section th:replace="~{features/favorite/components :: controls(${weeklyChatRanks}, ${nickName}, ${isAdmin})}"></section>
    <section th:replace="~{features/favorite/components :: board(${favoriteList}, ${isAdmin}, ${currentUserId})}"></section>
    <div th:replace="~{features/favorite/components :: pagination(${favoriteList}, ${nickName})}"></div>
</section>

<section class="vstack gap-3" th:fragment="controls(weeklyChatRanks, nickName, isAdmin)">
    <section aria-labelledby="my-favorite-heading" class="card" th:if="${isAdmin == false}">
        <div class="card-body py-3">
            <h2 class="small text-secondary fw-normal mb-1" id="my-favorite-heading">내 호감도</h2>
            <p class="mb-0 text-secondary">내 계정의 호감도와 내역만 표시합니다.</p>
        </div>
    </section>
    <section aria-labelledby="weekly-rank-heading" class="card" th:if="${isAdmin}">
        <div class="card-body py-3">
            <h2 class="small text-secondary fw-normal mb-2" id="weekly-rank-heading">주간 채팅 순위</h2>
            <ol class="list-unstyled d-flex flex-wrap gap-2 mb-0"
                th:if="${weeklyChatRanks != null and !#lists.isEmpty(weeklyChatRanks)}">
                <li class="badge rounded-pill tabular-nums"
                    th:classappend="${rank.rank == 1} ? ' bg-success-subtle text-success' : ' bg-secondary-subtle text-secondary'"
                    th:each="rank : ${weeklyChatRanks}"
                    th:text="${rank.rank + '위 ' + rank.nickname + ' · ' + rank.chatCount + '회'}">1위 치즈냥 · 10회</li>
            </ol>
            <div class="fs-6 text-secondary"
                 th:if="${weeklyChatRanks == null or #lists.isEmpty(weeklyChatRanks)}">이번 주 채팅 기록 없음</div>
        </div>
    </section>
    <form th:replace="~{features/favorite/components :: search-form(${nickName}, ${isAdmin})}"></form>
</section>

<form class="d-flex flex-wrap align-items-center gap-2"
      hx-disabled-elt="find button"
      hx-swap="outerHTML"
      hx-target="#favorite-board-region"
      id="favorite-search-form"
      method="get"
      th:action="@{/favorite/list}"
      th:fragment="search-form(nickName, isAdmin)"
      th:if="${isAdmin}"
      th:hx-get="@{/favorite/list}">
    <label class="visually-hidden" for="nickName">닉네임</label>
    <input class="form-control flex-grow-1 w-auto"
           id="nickName"
           name="nickName"
           placeholder="닉네임 또는 채널 ID 검색"
           th:value="${nickName}"
           type="text">
    <th:block th:replace="~{components/buttons :: action-button(null, '검색', 'ghost', 'submit', null)}"></th:block>
</form>

<section class="vstack gap-2" th:fragment="board(favoriteList, isAdmin, currentUserId)">
    <div class="alert alert-secondary mb-0"
         th:if="${favoriteList == null or #lists.isEmpty(favoriteList.content)}">표시할 사용자가 없습니다. 검색어를 확인해 주세요.</div>
    <th:block th:if="${favoriteList != null}">
        <th:block th:each="favoriteEntity, iterStat : ${favoriteList.content}">
            <th:block th:replace="~{features/favorite/components :: favorite-row(${favoriteEntity}, ${iterStat.index}, ${isAdmin}, ${currentUserId})}"></th:block>
        </th:block>
    </th:block>
</section>

<div th:fragment="favorite-row(favoriteEntity, rowIndex, isAdmin, currentUserId)"
     class="card"
     th:with="canViewHistory=${isAdmin or (currentUserId != null and currentUserId == favoriteEntity.userId)},
              rank=${favoriteList != null ? favoriteList.number * favoriteList.size + rowIndex + 1 : rowIndex + 1},
              favoriteValue=${favoriteEntity.favorite == null ? 0 : favoriteEntity.favorite}"
     th:classappend="${favoriteValue < 0} ? ' bg-danger-subtle border-danger-subtle'">
    <div class="card-body py-3">
        <div class="d-flex flex-wrap align-items-center gap-3">
            <span class="badge d-flex align-items-center justify-content-center flex-shrink-0 tabular-nums"
                  style="width:28px;height:28px;"
                  th:classappend="${favoriteValue < 0} ? ' bg-danger-subtle text-danger' :
                    (${rank == 1} ? ' bg-success-subtle text-success' : ' bg-secondary-subtle text-secondary')"
                  th:text="${rank}">1</span>
            <div class="flex-grow-1 overflow-hidden" style="min-width:9rem;">
                <div class="d-flex align-items-center gap-2">
                    <strong class="text-truncate" th:classappend="${rank == 1} ? ' text-white'" th:text="${favoriteEntity.nickName}">테스트</strong>
                    <span class="badge rounded-pill bg-danger-subtle text-danger flex-shrink-0"
                          th:if="${favoriteValue < 0}">음수 잔액</span>
                </div>
                <span class="d-block small text-secondary text-truncate" th:text="${favoriteEntity.userId}">user-id</span>
            </div>
            <span class="fs-5 fw-bold text-end tabular-nums flex-shrink-0 ms-auto"
                  th:classappend="${favoriteValue < 0} ? ' text-danger' : (${rank == 1} ? ' text-success' : '')"
                  th:text="${#numbers.formatInteger(favoriteValue, 0, 'COMMA')}">12,200</span>
            <div class="d-flex gap-2 flex-shrink-0">
                <button class="btn btn-outline-secondary btn-sm"
                        data-bs-toggle="collapse"
                        th:aria-controls="${'history-' + rowIndex}"
                        th:data-bs-target="${'#history-' + rowIndex}"
                        th:hx-get="@{/favorite/history(userId=${favoriteEntity.userId},limit=10)}"
                        th:hx-target="${'#history-content-' + rowIndex}"
                        th:if="${canViewHistory}"
                        hx-swap="innerHTML"
                        type="button">내역</button>
                <span class="text-secondary small align-self-center" th:unless="${canViewHistory}">-</span>
                <button class="btn btn-outline-secondary btn-sm"
                        data-bs-target="#karma-modal"
                        data-bs-toggle="modal"
                        th:hx-get="@{/favorite/adjustments/modal(userId=${favoriteEntity.userId},nickName=${favoriteEntity.nickName},favorite=${favoriteEntity.favorite})}"
                        th:if="${isAdmin}"
                        hx-swap="outerHTML"
                        hx-target="#karma-modal-content"
                        type="button">호감도 수정</button>
            </div>
        </div>
        <div class="collapse" th:id="${'history-' + rowIndex}">
            <div class="border-top border-dashed mt-3 pt-3 ps-2 ps-md-5" th:id="${'history-content-' + rowIndex}">
                <div class="text-secondary small">불러오는 중...</div>
            </div>
        </div>
    </div>
</div>

<div th:fragment="history-grid(histories)" data-history-loaded="true">
    <div class="text-secondary small" th:if="${histories == null or #lists.isEmpty(histories)}">히스토리 없음</div>
    <div class="vstack gap-2 small" th:if="${histories != null and !#lists.isEmpty(histories)}">
        <div class="d-flex flex-wrap align-items-center gap-3" th:each="history : ${histories}">
            <span class="text-secondary tabular-nums flex-shrink-0"
                  th:text="${history.date != null ? history.date : '-'}">2026-03-22 14:30</span>
            <span class="flex-grow-1" th:text="${history.history != null ? history.history : '-'}">출석체크(+1)</span>
            <span class="text-end fw-semibold tabular-nums flex-shrink-0"
                  th:text="${history.favorite != null ? '반영 후 ' + history.favorite : '-'}">반영 후 12</span>
        </div>
    </div>
</div>

<div th:fragment="pagination(favoriteList, nickName)" th:if="${favoriteList != null}">
    <nav th:if="${favoriteList.totalPages > 1}"
         th:with="blockSize=${10}, start=${favoriteList.number - (favoriteList.number % blockSize)},
          endCandidate=${start + blockSize - 1},
          end=${endCandidate < favoriteList.totalPages ? endCandidate : favoriteList.totalPages - 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${favoriteList.number == 0} ? 'disabled'">
                <a aria-label="이전 페이지"
                   class="page-link"
                   hx-swap="outerHTML"
                   hx-target="#favorite-board-region"
                   th:href="@{/favorite/list(page=${favoriteList.number - 1},size=${favoriteList.size},nickName=${nickName})}"
                   th:hx-get="@{/favorite/list(page=${favoriteList.number - 1},size=${favoriteList.size},nickName=${nickName})}">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>

            <li class="page-item" th:if="${start > 0}">
                <a class="page-link"
                   hx-swap="outerHTML"
                   hx-target="#favorite-board-region"
                   th:href="@{/favorite/list(page=0,size=${favoriteList.size},nickName=${nickName})}"
                   th:hx-get="@{/favorite/list(page=0,size=${favoriteList.size},nickName=${nickName})}">1</a>
            </li>
            <li class="page-item disabled" th:if="${start > 1}">
                <span class="page-link">...</span>
            </li>

            <li class="page-item"
                th:classappend="${i == favoriteList.number} ? 'active'"
                th:each="i : ${#numbers.sequence(start, end)}">
                <a class="page-link"
                   hx-swap="outerHTML"
                   hx-target="#favorite-board-region"
                   th:href="@{/favorite/list(page=${i},size=${favoriteList.size},nickName=${nickName})}"
                   th:hx-get="@{/favorite/list(page=${i},size=${favoriteList.size},nickName=${nickName})}"
                   th:text="${i + 1}"></a>
            </li>

            <li class="page-item disabled" th:if="${end < favoriteList.totalPages - 2}">
                <span class="page-link">...</span>
            </li>
            <li class="page-item" th:if="${end < favoriteList.totalPages - 1}">
                <a class="page-link"
                   hx-swap="outerHTML"
                   hx-target="#favorite-board-region"
                   th:href="@{/favorite/list(page=${favoriteList.totalPages - 1},size=${favoriteList.size},nickName=${nickName})}"
                   th:hx-get="@{/favorite/list(page=${favoriteList.totalPages - 1},size=${favoriteList.size},nickName=${nickName})}"
                   th:text="${favoriteList.totalPages}"></a>
            </li>

            <li class="page-item" th:classappend="${favoriteList.number == favoriteList.totalPages - 1} ? 'disabled'">
                <a aria-label="다음 페이지"
                   class="page-link"
                   hx-swap="outerHTML"
                   hx-target="#favorite-board-region"
                   th:href="@{/favorite/list(page=${favoriteList.number + 1},size=${favoriteList.size},nickName=${nickName})}"
                   th:hx-get="@{/favorite/list(page=${favoriteList.number + 1},size=${favoriteList.size},nickName=${nickName})}">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
