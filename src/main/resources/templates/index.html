<!DOCTYPE html>
<html data-bs-theme="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <meta name="_csrf" th:content="${_csrf.token}" th:if="${_csrf != null}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}" th:if="${_csrf != null}">
    <title th:text="${landingMode} ? '치즈냥 호감도' : '호감도'">치즈냥 호감도</title>
    <meta content="치즈냥의 호감도 보드와 주간 채팅 순위를 확인해 보세요."
          name="description"
          th:if="${landingMode}">
    <meta content="website" property="og:type" th:if="${landingMode}">
    <meta content="치즈냥" property="og:site_name" th:if="${landingMode}">
    <meta content="치즈냥 호감도" property="og:title" th:if="${landingMode}">
    <meta content="치즈냥의 호감도 보드와 주간 채팅 순위를 확인해 보세요."
          property="og:description"
          th:if="${landingMode}">
    <meta content="https://spring.nowstart.org/nyang-nyang-bot/" property="og:url" th:if="${landingMode}">
    <meta content="https://spring.nowstart.org/nyang-nyang-bot/assets/index.png"
          property="og:image"
          th:if="${landingMode}">
    <meta content="summary_large_image" name="twitter:card" th:if="${landingMode}">
    <meta content="치즈냥 호감도" name="twitter:title" th:if="${landingMode}">
    <meta content="치즈냥의 호감도 보드와 주간 채팅 순위를 확인해 보세요."
          name="twitter:description"
          th:if="${landingMode}">
    <meta content="https://spring.nowstart.org/nyang-nyang-bot/assets/index.png"
          name="twitter:image"
          th:if="${landingMode}">
    <link href="https://fonts.googleapis.com" rel="preconnect" th:unless="${landingMode}">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect" th:unless="${landingMode}">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
          rel="stylesheet"
          th:unless="${landingMode}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          crossorigin="anonymous"
          th:unless="${landingMode}">
    <script defer src="https://unpkg.com/htmx.org@2.0.4" th:unless="${landingMode}"></script>
    <link href="/css/design-system.css"
          rel="stylesheet"
          th:href="@{/css/design-system.css}"
          th:unless="${landingMode}">
    <link href="/css/favorite-list.css"
          rel="stylesheet"
          th:href="@{/css/favorite-list.css}"
          th:unless="${landingMode}">
    <link href="https://nng-phinf.pstatic.net/MjAyNDAzMDlfMjQg/MDAxNzA5OTI3ODk5MTk4.-R_7VTIWynEx4CSWpUvSgqWIGlylkkv-hv8JsHugcvQg.d3Vl9GN584w3__Lxbaq5zWYBBhugPJ-CIZHl6KoZ1-8g.PNG/%ED%95%98%ED%8A%B8%EC%86%90_%EC%95%8C%ED%8A%B8%EB%B8%8C%EC%9D%B4.png?type=f120_120_na"
          rel="icon">
</head>
<body class="bg-dark bg-gradient text-light" th:attr="data-current-user-id=${currentUserId},data-is-admin=${isAdmin}">
<noscript th:if="${landingMode}">
    <p>
        자바스크립트가 꺼져 있어 자동 이동이 되지 않았습니다.
        <a href="/oauth2/authorization/chzzk" th:href="@{/oauth2/authorization/chzzk}">로그인하기</a>
    </p>
</noscript>

<div class="page" th:unless="${landingMode}">
    <header th:replace="~{features/favorite/components :: hero(${currentNickName})}"></header>

    <div class="alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div th:if="${isAdmin}" th:replace="~{features/favorite/components :: admin-tabs}"></div>

    <section th:replace="~{features/favorite/components :: favorite-tab(${favoriteList}, ${nickName}, ${isAdmin}, ${weeklyChatRanks})}"></section>

    <section class="tab-panel" id="attendance-tab" role="tabpanel" th:if="${isAdmin}">
        <div th:replace="~{features/attendance/components :: attendance-panel}"></div>
    </section>

    <section class="tab-panel" id="roulette-tab" role="tabpanel" th:if="${isAdmin}">
        <div th:replace="~{features/roulette/components :: roulette-panel}"></div>
    </section>

    <section class="tab-panel" id="command-tab" role="tabpanel" th:if="${isAdmin}">
        <div th:replace="~{features/command/regions :: command-panel}"></div>
    </section>
</div>

<div th:replace="~{components/feedback :: toast}" th:unless="${landingMode}"></div>
<th:block th:if="${!landingMode and isAdmin}">
    <div th:replace="~{features/favorite/overlays :: karma-modal}"></div>
    <div th:replace="~{components/feedback :: loading}"></div>
</th:block>

<script th:if="${landingMode}" th:inline="javascript">
    (function () {
        var loginUrl = /*[[@{/oauth2/authorization/chzzk}]]*/ '/oauth2/authorization/chzzk';
        window.location.replace(loginUrl);
    })();
</script>

<th:block th:unless="${landingMode}">
    <script th:inline="javascript">
        window.baseUrl = /*[[@{/}]]*/ '/';
    </script>
    <script src="/js/favorite-list.js" th:src="@{/js/favorite-list.js}"></script>
</th:block>
</body>
</html>
