<!DOCTYPE html>
<html data-bs-theme="dark" lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <meta name="_csrf" th:content="${_csrf.token}" th:if="${_csrf != null}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}" th:if="${_csrf != null}">
    <title th:text="${landingMode} ? '치즈냥 호감도' : '호감도'">치즈냥 호감도</title>
    <meta content="치즈냥의 호감도 보드와 주간 채팅 순위를 확인해 보세요."
          name="description"
          th:if="${landingMode}">
    <meta content="website" property="og:type" th:if="${landingMode}">
    <meta content="치즈냥" property="og:site_name" th:if="${landingMode}">
    <meta content="치즈냥 호감도" property="og:title" th:if="${landingMode}">
    <meta content="치즈냥의 호감도 보드와 주간 채팅 순위를 확인해 보세요."
          property="og:description"
          th:if="${landingMode}">
    <meta content="https://spring.nowstart.org/nyang-nyang-bot/" property="og:url" th:if="${landingMode}">
    <meta content="https://spring.nowstart.org/nyang-nyang-bot/assets/index.png"
          property="og:image"
          th:if="${landingMode}">
    <meta content="summary_large_image" name="twitter:card" th:if="${landingMode}">
    <meta content="치즈냥 호감도" name="twitter:title" th:if="${landingMode}">
    <meta content="치즈냥의 호감도 보드와 주간 채팅 순위를 확인해 보세요."
          name="twitter:description"
          th:if="${landingMode}">
    <meta content="https://spring.nowstart.org/nyang-nyang-bot/assets/index.png"
          name="twitter:image"
          th:if="${landingMode}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          crossorigin="anonymous">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap"
          rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
    <script defer src="https://unpkg.com/htmx.org@2.0.4" th:unless="${landingMode}"></script>
    <script crossorigin="anonymous"
            defer
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            th:unless="${landingMode}"></script>
    <link href="https://nng-phinf.pstatic.net/MjAyNDAzMDlfMjQg/MDAxNzA5OTI3ODk5MTk4.-R_7VTIWynEx4CSWpUvSgqWIGlylkkv-hv8JsHugcvQg.d3Vl9GN584w3__Lxbaq5zWYBBhugPJ-CIZHl6KoZ1-8g.PNG/%ED%95%98%ED%8A%B8%EC%86%90_%EC%95%8C%ED%8A%B8%EB%B8%8C%EC%9D%B4.png?type=f120_120_na"
          rel="icon">
</head>
<body class="bg-dark text-light"
      th:attr="hx-headers=${_csrf == null ? null : '{&quot;' + _csrf.headerName + '&quot;:&quot;' + _csrf.token + '&quot;}'}">
<main class="bg-landing-glow min-vh-100 d-flex align-items-center justify-content-center px-4 py-5"
      th:if="${landingMode}">
    <section aria-labelledby="landing-heading"
             class="d-flex flex-column align-items-center text-center"
             style="max-width:26rem;">
        <img th:replace="~{components/brand :: logo(64, 'rounded-4 mb-4')}">
        <h1 class="fw-bold text-white mb-3" id="landing-heading"
            style="font-size:2rem;letter-spacing:-0.01em;">치즈냥 호감도</h1>
        <p class="text-secondary mb-4">
            치즈냥 채널의 호감도 랭킹과 내 히스토리,<br>
            업보·쿠폰 보유 내역을 한 곳에서 확인하세요.
        </p>
        <a class="btn btn-success btn-lg w-100 mb-3 d-inline-flex align-items-center justify-content-center gap-2"
           th:href="@{/oauth2/authorization/chzzk}">
            <span aria-hidden="true"
                  class="d-inline-flex align-items-center justify-content-center rounded-circle fw-bold"
                  style="width:1.25rem;height:1.25rem;background:#001b10;color:#00ffa3;font-size:0.7rem;">C</span>
            치지직 계정으로 로그인
        </a>
        <p class="text-secondary mb-4" style="font-size:0.75rem;">
            CHZZK OAuth로 안전하게 로그인합니다. 채널 ID 외 정보는 저장하지 않습니다.
        </p>
        <ul class="list-unstyled d-flex flex-wrap justify-content-center column-gap-4 small text-secondary mb-0">
            <li><span aria-hidden="true" class="text-success me-1">&bull;</span>호감도 랭킹</li>
            <li><span aria-hidden="true" class="text-success me-1">&bull;</span>내 히스토리</li>
            <li><span aria-hidden="true" class="text-success me-1">&bull;</span>룰렛 결과</li>
        </ul>
    </section>
</main>

<div class="container-xl px-4 py-4 vstack gap-3" th:unless="${landingMode}">
    <header th:replace="~{features/favorite/components :: hero(${currentNickName})}"></header>

    <div class="alert" th:if="${errorMessage}" th:text="${errorMessage}"></div>

    <div th:if="${isAdmin}" th:replace="~{features/favorite/components :: admin-tabs}"></div>

    <div class="tab-content">
        <section th:replace="~{features/favorite/components :: favorite-tab(${favoriteList}, ${nickName}, ${isAdmin}, ${weeklyChatRanks})}"></section>

        <section aria-labelledby="attendance-tab-button" class="tab-pane fade" id="attendance-tab" role="tabpanel" th:if="${isAdmin}">
            <div th:replace="~{features/attendance/components :: attendance-panel}"></div>
        </section>

        <section aria-labelledby="roulette-tab-button" class="tab-pane fade" id="roulette-tab" role="tabpanel" th:if="${isAdmin}">
            <div th:replace="~{features/roulette/components :: roulette-panel}"></div>
        </section>

        <section aria-labelledby="command-tab-button" class="tab-pane fade" id="command-tab" role="tabpanel" th:if="${isAdmin}">
            <div th:replace="~{features/command/regions :: command-panel}"></div>
        </section>
    </div>
</div>

<th:block th:if="${!landingMode and isAdmin}">
    <div th:replace="~{features/favorite/overlays :: karma-modal}"></div>
</th:block>
</body>
</html>
