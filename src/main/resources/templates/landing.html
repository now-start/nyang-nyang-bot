<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title>치즈냥 호감도</title>
    <meta content="치즈냥의 호감도 보드와 주간 채팅 순위를 확인해 보세요." name="description">
    <meta content="website" property="og:type">
    <meta content="치즈냥" property="og:site_name">
    <meta content="치즈냥 호감도" property="og:title">
    <meta content="치즈냥의 호감도 보드와 주간 채팅 순위를 확인해 보세요." property="og:description">
    <meta content="https://spring.nowstart.org/nyang-nyang-bot/" property="og:url">
    <meta content="https://spring.nowstart.org/nyang-nyang-bot/assets/index.png" property="og:image">
    <meta content="summary_large_image" name="twitter:card">
    <meta content="치즈냥 호감도" name="twitter:title">
    <meta content="치즈냥의 호감도 보드와 주간 채팅 순위를 확인해 보세요." name="twitter:description">
    <meta content="https://spring.nowstart.org/nyang-nyang-bot/assets/index.png" name="twitter:image">
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --bg: #f6efe6;
            --panel: rgba(255, 252, 247, 0.88);
            --text: #25160f;
            --muted: #6b584d;
            --primary: #cf5a2a;
            --border: rgba(37, 22, 15, 0.1);
            --shadow: 0 28px 80px rgba(90, 42, 18, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: "Archivo", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.7), transparent 38%),
            radial-gradient(circle at bottom right, rgba(207, 90, 42, 0.16), transparent 32%),
            linear-gradient(135deg, #f6efe6, #f3d4b8);
        }

        .card {
            width: min(680px, 100%);
            padding: 32px;
            border: 1px solid var(--border);
            border-radius: 28px;
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }

        .badge {
            display: inline-flex;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            color: var(--primary);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 18px 0 12px;
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(36px, 8vw, 64px);
            line-height: 0.96;
            letter-spacing: -0.05em;
        }

        p {
            margin: 0;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 50px;
            padding: 0 20px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 700;
        }

        .button-primary {
            background: var(--primary);
            color: #fffaf5;
        }
    </style>
</head>
<body>
<main class="card">
    <span class="badge">Nyang Nyang Bot</span>
    <h1>치즈냥 호감도</h1>
    <p>링크 미리보기는 여기서 보여주고, 실제 사용자는 치지직 로그인으로 바로 이동합니다.</p>
    <div class="actions">
        <a class="button button-primary" href="/login" th:href="@{/login}">로그인하기</a>
    </div>
</main>

<script th:inline="javascript">
    (function () {
        var loginUrl = /*[[@{/login}]]*/ '/login';
        window.location.replace(loginUrl);
    })();
</script>
</body>
</html>
