chzzk:
  chat:
    auto-connect-enabled: false
  client-id: ${CHZZK_CLIENT_ID:local-client}
  client-secret: ${CHZZK_CLIENT_SECRET:local-secret}
  redirect-uri: http://localhost:8080/login/oauth2/code/chzzk

nyang:
  timer:
    enabled: false
  local-auth:
    enabled: true
    login-page-enabled: true

spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  devtools:
    restart:
      enabled: false
  datasource:
    url: "jdbc:h2:mem:nyangnyangbot;MODE=MariaDB;TIME ZONE=Asia/Seoul;INIT=CREATE DOMAIN IF NOT EXISTS LONGTEXT AS LONGVARCHAR;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

logging:
  level:
    org.hibernate.SQL: debug

google:
  spreadsheet:
    sync:
      enabled: false

otel:
  sdk:
    disabled: true
