chzzk:
  chat:
    auto-connect-enabled: false
  client-id: ${CHZZK_CLIENT_ID}
  client-secret: ${CHZZK_CLIENT_SECRET}
  redirect-uri: http://localhost:8080/login/oauth2/code/chzzk

spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  datasource:
    url: "jdbc:h2:mem:nyangnyangbot;MODE=MariaDB;INIT=CREATE DOMAIN IF NOT EXISTS LONGTEXT AS CLOB;DB_CLOSE_DELAY=-1"
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

logging:
  level:
    org.hibernate.SQL: debug

eureka:
  client:
    enabled: false

google:
  spreadsheet:
    sync:
      enabled: false

otel:
  sdk:
    disabled: true
